<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Werkblad</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 40px;
}

.hidden { display: none; }

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

td, th {
    border: 1px solid black;
    padding: 15px;
    cursor: pointer;
}

tr:hover { background: lightgray; }

.container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
}

input {
    background: black;
    color: white;
    border: none;
    padding: 20px;
    font-size: 20px;
    width: 100%;
}

.big { font-size: 50px; font-weight: bold; }

.box {
    border: 5px solid black;
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    position: relative;
}

.timer {
    font-size: 40px;
    cursor: pointer;
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

.title { font-size: 30px; font-weight: bold; }

.fullscreen {
    position: fixed;
    top:0; left:0;
    width:100vw; height:100vh;
    background:white;
    z-index:999;
}

button {
    padding: 15px;
    font-size: 20px;
    margin-top: 20px;
    cursor: pointer;
}

.back { background: gray; color: white; }
.end { background: green; color: white; }

.topBtn {
    position:absolute;
    top:20px;
    right:20px;
}

#nextBtn, #prevBtn {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    background:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    display:none;
}

.fullscreen #nextBtn,
.fullscreen #prevBtn {
    display:block;
}

#nextBtn { right:30px; }
#prevBtn { left:30px; }

#imageContainer {
    display:flex;
    gap:10px;
}

.split img {
    width:50%;
}

#splitBtn {
    position:absolute;
    bottom:20px;
    right:20px;
}
</style>
</head>

<body>

<!--START -->
<div id="start">

<h1>Kies order</h1>
<button class="topBtn" onclick="toon('balie')">Balieklant</button>

<table id="tabel"></table>

</div>

<!-- WERKBLAD -->
<div id="werk" class="hidden">

<button class="back" onclick="terug()">⬅ Terug</button>

<div class="container">

<div>
<h2>Ordernummer</h2>
<input id="order" readonly>

<h2>Artikelnummer</h2>
<input id="artikel" readonly>

<p class="big">Aantal: <span id="aantal"></span></p>
</div>

<div>
<div class="box" id="vak" onclick="toggleFullscreen()">

<div id="imageContainer">
<img src="image.png" id="image">
<img src="image2.png" id="image2" class="hidden">
</div>

<button id="splitBtn" onclick="toggleSplit(event)">🌓</button>

<div id="prevBtn" onclick="prevImage(event)">⬅</div>
<div id="nextBtn" onclick="nextImage(event)">➡</div>

</div>
</div>

</div>

<div class="container">

<div>
<p class="title">Insteltijd</p>
<div class="timer" onclick="startTimer('t1')">00:00:00</div>
</div>

<div>
<p class="title">Werktijd</p>
<div class="timer" onclick="startTimer('t2')">00:00:00</div>
</div>

</div>

<button class="end" onclick="eindeOrder()">Order afronden</button>

</div>

<!-- BALIE -->
<div id="balie" class="hidden">
<button class="back" onclick="toon('start')">⬅ Terug</button>

<h1>Kies werknemer</h1>
<button onclick="openPersoon('Walter')">Walter</button>
<button onclick="openPersoon('Saban')">Saban</button>
</div>

<!-- PERSOON -->
<div id="persoon" class="hidden">
<button class="back" onclick="toon('balie')">⬅ Terug</button>

<h1 id="naamPersoon"></h1>
<button onclick="toon('bon')">Bon maken</button>
<button onclick="toon('start')">Uitklokken balie</button>
</div>

<!-- BON -->
<div id="bon" class="hidden">
<button class="back" onclick="toon('persoon')">⬅ Terug</button>

<h1>Bon maken</h1>
<button onclick="bonKlaar()">Bon klaar</button>

</div>

<script>

// NAVIGATIE
function toon(p){
 document.querySelectorAll("body > div").forEach(d=>d.classList.add("hidden"));
 document.getElementById(p).classList.remove("hidden");
}

// TABEL
let tabel = document.getElementById("tabel");

tabel.innerHTML = `
<tr>
<th>Klaar</th>
<th>tek:</th>
<th>M</th>
<th>Size</th>
<th>Moergraf.</th>
<th>Flares</th>
<th>Aantal</th>
<th>Machine</th>
<th>Order</th>
<th>Artikel</th>
</tr>
`;

let orders=[];
let vastOrder = Math.floor(Math.random()*10000);

for(let i=0;i<5;i++){

 let order = vastOrder;
 let artikel = Math.floor(Math.random()*10000);
 let aantal = Math.floor(Math.random()*20)+1;

 orders.push({order, artikel, aantal, klaar:false});

 tabel.innerHTML += `
<tr>
<td id="status-${i}"></td>

<td onclick="klikVak(${i},1)" id="c-${i}-1"></td>

<td onclick="klikM(${i})" id="m-${i}"></td>

<td onclick="klikSize(${i})" id="size-${i}"></td>

<td onclick="klikVak(${i},4)" id="c-${i}-4"></td>
<td onclick="klikVak(${i},5)" id="c-${i}-5"></td>

<td>${aantal}</td>

<td style="background:green"></td>

<td onclick="openOrder(${i})">${order}</td>
<td onclick="openOrder(${i})">${artikel}</td>
</tr>
`;
}

//  M
function klikM(i){
 let cel=document.getElementById("m-"+i);
 if(cel.textContent==="") cel.textContent="S";
 else if(cel.textContent==="S") cel.textContent="W";
 else cel.textContent="";
}

// SIZE (nieuw)
function klikSize(i){
 let cel = document.getElementById("size-"+i);
 let maten = ["", "1/4", "3/8", "1/2", "3/4", "1", "1/8"];
 let index = maten.indexOf(cel.textContent);
 index = (index + 1) % maten.length;
 cel.textContent = maten[index];
}

// kruisjes
function klikVak(r,k){
 let cel=document.getElementById(`c-${r}-${k}`);
 cel.textContent = cel.textContent==="❌" ? "" : "❌";
}

// ORDER OPENEN
let currentIndex=null;

function openOrder(i){
 let selected=orders[i];
 currentIndex=i;

 document.getElementById("start").classList.add("hidden");
 document.getElementById("werk").classList.remove("hidden");

 document.getElementById("order").value=selected.order;
 document.getElementById("artikel").value=selected.artikel;
 document.getElementById("aantal").textContent=selected.aantal;

 huidige=0;
 document.getElementById("image").src=afbeeldingen[0];

 // reset split
 splitMode=false;
 document.getElementById("image2").classList.add("hidden");
 document.getElementById("imageContainer").classList.remove("split");
}

// AFRONDEN
function eindeOrder(){
 orders[currentIndex].klaar=true;
 document.getElementById("status-"+currentIndex).textContent="✅";
 terug();
}

// TERUG
function terug(){
 toon("start");
}

// TIMERS (ongewijzigd)
let timers={
 t1:{time:0,running:false,interval:null},
 t2:{time:0,running:false,interval:null}
};

function startTimer(id){
 let t=timers[id];

 if(!t.running){
  t.running=true;
  t.interval=setInterval(()=>{
   t.time+=10;

   let m=Math.floor(t.time/60000);
   let s=Math.floor((t.time%60000)/1000);

   document.querySelectorAll('.timer')[id==='t1'?0:1]
   .textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:00`;
  },10);
 } else {
  clearInterval(t.interval);
  t.running=false;
 }
}

// FULLSCREEN
function toggleFullscreen(){
 document.getElementById("vak").classList.toggle("fullscreen");
}

// AFBEELDINGEN
let afbeeldingen=["image.png","image2.png"];
let huidige=0;

function nextImage(e){
 e.stopPropagation();
 huidige=(huidige+1)%afbeeldingen.length;
 document.getElementById("image").src=afbeeldingen[huidige];
}

function prevImage(e){
 e.stopPropagation();
 huidige=(huidige-1+afbeeldingen.length)%afbeeldingen.length;
 document.getElementById("image").src=afbeeldingen[huidige];
}

// SPLIT
let splitMode=false;

function toggleSplit(e){
 e.stopPropagation();

 let container = document.getElementById("imageContainer");
 let img2 = document.getElementById("image2");

 splitMode=!splitMode;

 if(splitMode){
   container.classList.add("split");
   img2.classList.remove("hidden");
 } else {
   container.classList.remove("split");
   img2.classList.add("hidden");
 }
}

// BALIE
function openPersoon(n){
 document.getElementById("naamPersoon").textContent=n;
 toon("persoon");
}

function bonKlaar(){
 toon("start");
}

</script>
</body>
</html>
